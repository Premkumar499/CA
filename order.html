<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order & Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<nav>
    <a href="home.html">
        <img src="assets/amazon_logo.png" width="100">
    </a>

    <div class="nav_contry">
        <img src="assets/location_icon.png" height="20">
        <div>
            <p>Deliver to</p>
            <h1>United Kingdom</h1>
        </div>
    </div>

    <div class="nav_search">
        <div class="nav_search_category">
            <p>All</p>
            <img src="assets/dropdown_icon.png" height="12">
        </div>
        <input type="text" class="nav_search_input" placeholder="Search Amazon">
        <img src="assets/search_icon.png" class="nav_search_icon">
    </div>

    <div class="nav_language">
        <img src="assets/us_flag.png" width="25">
        <p>EN</p>
    </div>

    <div class="nav_text">
        <p>Hello, Sign in</p>
        <h1>Account & Lists</h1>
    </div>

    <div class="nav_text">
        <p>Return</p>
        <h1>& Orders</h1>
    </div>

    <a href="order.html" class="nav_cart">
        <img src="assets/cart_icon.png" width="35">
        <h4>Cart</h4>
    </a>
</nav>

<div class="nav_bottom">
    <p>Today's Deals</p>
    <p>Customer Service</p>
    <p>Registry</p>
    <p>Gift Cards</p>
    <p>Sell</p>
</div>

<!-- ===== CONTACT SECTION ===== -->

<section class="contact-wrapper">
    <div class="contact-box">
        <h2>Contact Us</h2>
        <p>We would love to hear from you</p>

        <form>
            <div class="form-group">
                <label>Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea rows="5" placeholder="Write your message..." required></textarea>
            </div>

            <button type="submit" class="contact-btn">Send Message</button>
        </form>
    </div>
</section>

</body>
</html>
